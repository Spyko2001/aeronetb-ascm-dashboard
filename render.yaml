services:
  - type: web
    name: aeronetb-ascm-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: aeronetb-ascm-postgres
          property: connectionString
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: aeronetsystem
      - key: SESSION_SECRET
        generateValue: true
      - key: AUTO_SEED
        value: true
databases:
  - name: aeronetb-ascm-postgres
    plan: free
    databaseName: aeronetsql
    user: student
